name: Resolve File Converter Linux Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Simulated tag for testing'
        required: false
        default: 'v1.0.0-test'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux Bundle and AppImage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate tag (automatic runs only)
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF#refs/tags/}
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: $TAG (must match vX.Y.Z)"
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      - name: Install Linux build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: appstream appstream-compose appstream-util clang cmake libappstream-glib8 libfuse2 libglib2.0-bin libgtk-3-dev ninja-build pkg-config
          version: 1.0

      - name: Build Linux release
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release

      - name: Archive Linux bundle
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'push' && github.ref_name || github.event.inputs.test_tag }}"
          TAG_NUMBER="${TAG#v}"
          BUNDLE_ASSET_NAME="resolve-file-converter-${TAG_NUMBER}-linux-x86_64.tar.gz"
          tar -C build/linux/x64/release -czf "$BUNDLE_ASSET_NAME" bundle
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "BUNDLE_ASSET_NAME=$BUNDLE_ASSET_NAME" >> "$GITHUB_ENV"

      - name: Install appimage-builder
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o appimage-builder-x86_64.AppImage https://github.com/AppImageCrafters/appimage-builder/releases/download/v1.1.0/appimage-builder-1.1.0-x86_64.AppImage
          chmod +x appimage-builder-x86_64.AppImage
          sudo mv appimage-builder-x86_64.AppImage /usr/local/bin/appimage-builder

      - name: Build AppImage
        shell: bash
        run: |
          set -euo pipefail
          TAG_NUMBER="${TAG#v}"
          sed -i "/^AppDir:/,/^[^ ]/s/^\( *version: *\).*/\1${TAG_NUMBER}/" AppImageBuilder.yml
          appimage-builder --recipe AppImageBuilder.yml --skip-test
          ORIGINAL_APPIMAGE="Resolve_File_Converter-${TAG_NUMBER}-x86_64.AppImage"
          if [[ ! -f "$ORIGINAL_APPIMAGE" ]]; then
            mapfile -t GENERATED_APPIMAGES < <(find . -maxdepth 1 -name '*.AppImage' -print | sort)
            if [[ "${#GENERATED_APPIMAGES[@]}" -ne 1 ]]; then
              echo "::error::Expected exactly one generated AppImage, found ${#GENERATED_APPIMAGES[@]}"
              printf '%s\n' "${GENERATED_APPIMAGES[@]}"
              exit 1
            fi
            ORIGINAL_APPIMAGE="${GENERATED_APPIMAGES[0]}"
          fi
          chmod +x "$ORIGINAL_APPIMAGE"
          "$ORIGINAL_APPIMAGE" --appimage-version >/dev/null
          APPIMAGE_ASSET_NAME="resolve-file-converter-${TAG_NUMBER}-linux-x86_64.AppImage"
          mv "$ORIGINAL_APPIMAGE" "$APPIMAGE_ASSET_NAME"
          echo "APPIMAGE_ASSET_NAME=$APPIMAGE_ASSET_NAME" >> "$GITHUB_ENV"

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TITLE="Resolve File Converter $TAG"
          GH_TOKEN=$GITHUB_TOKEN
          unset GITHUB_TOKEN
          gh auth login --with-token <<< "$GH_TOKEN"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            if ! gh release create "$TAG" \
              --title "$TITLE" \
              --notes "Release $TAG" \
              "$BUNDLE_ASSET_NAME" \
              "$APPIMAGE_ASSET_NAME"; then
              echo "Release creation failed (likely already exists); continuing to upload."
            fi
          fi

          gh release upload "$TAG" --clobber "$BUNDLE_ASSET_NAME" "$APPIMAGE_ASSET_NAME"
