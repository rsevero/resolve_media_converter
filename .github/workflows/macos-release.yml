name: Resolve File Converter macOS Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Simulated tag for testing'
        required: false
        default: 'v1.0.0-test'

permissions:
  contents: write

jobs:
  build:
    name: Build macOS App
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate tag (automatic runs only)
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF#refs/tags/}
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: $TAG (must match vX.Y.Z)"
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      - name: Build macOS release
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release

      - name: Archive macOS app
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'push' && github.ref_name || github.event.inputs.test_tag }}"
          TAG_NUMBER="${TAG#v}"
          ASSET_NAME="resolve-file-converter-${TAG_NUMBER}-macos-x64.zip"
          ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/resolve_file_converter.app "$ASSET_NAME"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TITLE="Resolve File Converter $TAG"
          GH_TOKEN=$GITHUB_TOKEN
          unset GITHUB_TOKEN
          gh auth login --with-token <<< "$GH_TOKEN"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            if ! gh release create "$TAG" \
              --title "$TITLE" \
              --notes "Release $TAG" \
              "$ASSET_NAME"; then
              echo "Release creation failed (likely already exists); continuing to upload."
            fi
          fi

          gh release upload "$TAG" --clobber "$ASSET_NAME"
