name: Resolve Media Converter Windows Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Simulated tag for testing'
        required: false
        default: 'v1.0.0-test'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Validate tag (automatic runs only)
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF#refs/tags/}
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: $TAG (must match vX.Y.Z)"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref || '' }}
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      - name: Build Windows release
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Prepare installer files
        shell: bash
        run: |
          mkdir -p build/windows-installer
          cp packaging/windows/resolve_file_converter.iss build/windows-installer/

      - name: Create Inno Setup installer
        shell: cmd
        run: |
          set BUILD_DIR=%GITHUB_WORKSPACE%\build\windows\x64\runner\Release
          set OUTPUT_DIR=%GITHUB_WORKSPACE%\build\windows-installer

          for /f "tokens=*" %%i in ('powershell -command "(Get-Item '%BUILD_DIR%\resolve_file_converter.exe').VersionInfo.ProductVersion"') do set APP_VERSION=%%i

          powershell -Command "(Get-Content '%OUTPUT_DIR%\resolve_file_converter.iss') -replace 'C:\\resolve_file_converter\\build\\windows', '%GITHUB_WORKSPACE%\\build\\windows' -replace 'Resolve-Media-Converter-v\\{#AppVersion\\}-windows-x64', 'resolve-media-converter-${{ github.event_name == 'push' && github.ref_name || github.event.inputs.test_tag }}-windows-x64' | Set-Content '%OUTPUT_DIR%\resolve_file_converter.iss'"

          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "%OUTPUT_DIR%\resolve_file_converter.iss"

      - name: Set installer asset name
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "push") { "${{ github.ref_name }}" } else { "${{ github.event.inputs.test_tag }}" }
          $assetName = "resolve-media-converter-$tag-windows-x64.exe"
          Rename-Item -Path "build/windows-installer/resolve-media-converter-$tag-windows-x64.exe" -NewName $assetName -Force -ErrorAction SilentlyContinue
          if (-not (Test-Path $assetName)) {
            $generated = Get-ChildItem "build/windows-installer/*.exe" | Select-Object -First 1
            Copy-Item $generated.FullName $assetName -Force
          }
          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TITLE="Resolve Media Converter $TAG"
          GH_TOKEN=$GITHUB_TOKEN
          unset GITHUB_TOKEN
          gh auth login --with-token <<< "$GH_TOKEN"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            if ! gh release create "$TAG" \
              --title "$TITLE" \
              --notes "Release $TAG" \
              "$ASSET_NAME"; then
              echo "Release creation failed (likely already exists); continuing to upload."
            fi
          fi

          gh release upload "$TAG" --clobber "$ASSET_NAME"
