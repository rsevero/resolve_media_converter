# appimage-builder recipe
version: 1
script: |
  set -e
  set -x
  rm -rf AppDir || true
  cp -r build/linux/x64/release/bundle AppDir

  mkdir -p AppDir/usr/share/glib-2.0/schemas
  cp packaging/linux/appimage/schemas/org.gnome.settings-daemon.plugins.xsettings.gschema.xml \
    AppDir/usr/share/glib-2.0/schemas/
  glib-compile-schemas AppDir/usr/share/glib-2.0/schemas

  cat > AppDir/AppRun <<'APP_RUN_EOF'
  #!/bin/sh
  set -eu

  APPDIR="$(dirname "$(readlink -f "$0")")"
  export APPDIR
  export XDG_DATA_DIRS="$APPDIR/usr/share:${XDG_DATA_DIRS:-/usr/local/share:/usr/share}"
  export GDK_PIXBUF_MODULE_FILE="$APPDIR/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders.cache"

  exec "$APPDIR/usr/bin/resolve_file_converter" "$@"
  APP_RUN_EOF
  chmod +x AppDir/AppRun

  mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
  mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps
  mkdir -p AppDir/usr/share/icons/hicolor/64x64/apps
  mkdir -p AppDir/usr/share/icons/hicolor/32x32/apps
  mkdir -p AppDir/usr/share/icons/hicolor/16x16/apps

  cp assets/icons/resolve_file_converter-512.png AppDir/usr/share/icons/hicolor/512x512/apps/resolve_file_converter.png
  cp assets/icons/resolve_file_converter-256.png AppDir/usr/share/icons/hicolor/256x256/apps/resolve_file_converter.png
  cp assets/icons/resolve_file_converter-128.png AppDir/usr/share/icons/hicolor/128x128/apps/resolve_file_converter.png
  cp assets/icons/resolve_file_converter-64.png AppDir/usr/share/icons/hicolor/64x64/apps/resolve_file_converter.png
  cp assets/icons/resolve_file_converter-32.png AppDir/usr/share/icons/hicolor/32x32/apps/resolve_file_converter.png
  cp assets/icons/resolve_file_converter-16.png AppDir/usr/share/icons/hicolor/16x16/apps/resolve_file_converter.png

  mkdir -p AppDir/usr/share/applications
  cp packaging/linux/appimage/resolve_file_converter.desktop AppDir/usr/share/applications/
  ln -sf usr/share/icons/hicolor/512x512/apps/resolve_file_converter.png AppDir/.DirIcon
AppDir:
  path: ./AppDir
  app_info:
    id: com.example.resolve_file_converter
    name: Resolve File Converter
    version: 1.0.0
    exec: resolve_file_converter
    exec_args: $@
  apt:
    arch: amd64
    allow_unauthenticated: true
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ focal main restricted universe multiverse
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ focal-updates main restricted universe multiverse
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ focal-backports main restricted universe multiverse
      - sourceline: deb http://security.ubuntu.com/ubuntu focal-security main restricted universe multiverse
    include:
      - adwaita-icon-theme
      - gdk-pixbuf2.0-0
      - gdk-pixbuf2.0-bin
      - gdk-pixbuf2.0-common
      - hicolor-icon-theme
      - libgtk-3-0
      - librsvg2-2
      - librsvg2-common
      - shared-mime-info
    exclude:
      - humanity-icon-theme
      - ubuntu-mono
  after_bundle: |
    set -e
    APPDIR_PATH="$(pwd)/AppDir"
    mkdir -p "$APPDIR_PATH/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0"
    query_loader_bin=$(find "$APPDIR_PATH" -type f -name gdk-pixbuf-query-loaders | head -n1)
    if [ -z "$query_loader_bin" ]; then
      echo "gdk-pixbuf-query-loaders not found in AppDir" >&2
      exit 1
    fi
    LD_LIBRARY_PATH="$APPDIR_PATH/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}" \
      "$query_loader_bin" \
      > "$APPDIR_PATH/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders.cache"
  files:
    include:
      - lib64/ld-linux-x86-64.so.2
    exclude:
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/doc/*/TODO.*
AppImage:
  arch: x86_64
  update-information: guess
  sign-key: None
